<!DOCTYPE html>
<html>
  <head>

    <meta http-equiv="content-type" content="text/html; charset=windows-1252">
    <meta charset="UTF-8">
    <title>CAM Post Solutions Ltd</title>
    <style>
body {
   margin: 0;
   font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
   background-color: #f5f7fa;
   color: #333;
}

/* Navigation bar */
.navbar {
   background: linear-gradient(90deg, #1a1a1a, #2e2e2e);
   padding: 15px;
   text-align: center;
   box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.navbar a {
   color: white;
   margin: 0 20px;
   text-decoration: none;
   font-weight: 600;
   letter-spacing: 1px;
   transition: color 0.3s ease;
}

.navbar a:hover {
   color: #4CAF50;
}

/* Sections */
.section {
   display: none;
   padding: 60px 20px;
   text-align: center;
}

.active {
   display: block;
}

/* Card styling */
.card {
   background: white;
   max-width: 600px;
   margin: 0 auto;
   padding: 30px;
   border-radius: 12px;
   box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

img {
   max-width: 300px;
   margin-top: 40px;
}

h1 {
   margin-bottom: 20px;
}

p {
   font-size: 18px;
   margin: 10px 0;
}

.contact a {
   color: #4CAF50;
   text-decoration: none;
   font-weight: 500;
}

.contact a:hover {
   text-decoration: underline;
}
</style>
    <script>
function showPage(pageId) {
   document.getElementById('home').classList.remove('active');
   document.getElementById('about').classList.remove('active');
   document.getElementById(pageId).classList.add('active');
}
</script>
  </head>
  <body>
    <!-- Navigation -->
    <div class="navbar"> <a href="#" onclick="showPage('home')">HOME</a>
      <a href="#" onclick="showPage('about')">ABOUT</a>
    </div>
    <!-- Home Section -->
    <div id="home" class="section active">
      <div class="card"> <img src="logo.jpg" alt="Company Logo">
        <h1>Welcome to CAM Post Solutions Ltd</h1>
        <p>Specialists in CNC post processing solutions.</p>
      </div>
    </div>
    <!-- About Section -->
    <div id="about" class="section">
      <div class="card contact">
        <h1>About Us</h1>
        <p><strong>Location:</strong> Birmingham, UK</p>
        <p><strong>Email:</strong> <a
            href="mailto:support@campostsolutions.co.uk">support@campostsolutions.co.uk</a></p>
        <p><strong>Telephone:</strong> <a href="tel:+447976527042">+44
            7976 527042</a></p>
      </div>
    </div>
  </body>
</html>
